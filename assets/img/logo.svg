<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Subtle track ring -->
  <circle cx="20" cy="20" r="12" fill="none"
    stroke="rgba(255,255,255,0.15)" stroke-width="1.8"/>

  <!-- Main arc — 270° clockwise from top (20,8) to left (8,20) -->
  <path d="M 20 8 A 12 12 0 1 1 8 20"
    fill="none" stroke="white" stroke-width="2.6"
    stroke-linecap="round" opacity="0.92"/>

  <!-- Nova dot — glowing cyan star at arc tip -->
  <circle cx="8" cy="20" r="4.5" fill="#22d3ee" opacity="0.35" filter="url(#glow)"/>
  <circle cx="8" cy="20" r="3"   fill="#22d3ee"/>
  <circle cx="8" cy="20" r="1.5" fill="white"/>
</svg>
