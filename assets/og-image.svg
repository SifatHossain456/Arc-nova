<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e0f"/>
      <stop offset="100%" stop-color="#131318"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="25%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo icon -->
  <rect x="80" y="200" width="72" height="72" rx="18" fill="#7c3aed"/>
  <text x="116" y="252" font-family="Arial,sans-serif" font-size="38" font-weight="900" text-anchor="middle" fill="white">N</text>

  <!-- Arc Nova text -->
  <text x="174" y="253" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="white" letter-spacing="-2">Arc Nova</text>

  <!-- Tagline -->
  <text x="80" y="312" font-family="Arial,sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.45)">DeFi Hub on Arc Network</text>

  <!-- Main headline -->
  <text x="80" y="400" font-family="Arial,sans-serif" font-size="58" font-weight="900" fill="url(#textGrad)" letter-spacing="-2">Swap. Stake. Earn.</text>
  <text x="80" y="468" font-family="Arial,sans-serif" font-size="58" font-weight="900" fill="url(#textGrad)" letter-spacing="-2">Build on Arc.</text>

  <!-- Feature pills -->
  <rect x="80" y="510" width="120" height="36" rx="18" fill="rgba(124,58,237,0.20)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="140" y="533" font-family="Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#a78bfa">🔄 Swap</text>

  <rect x="214" y="510" width="130" height="36" rx="18" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <text x="279" y="533" font-family="Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#10b981">🏦 Stake</text>

  <rect x="358" y="510" width="130" height="36" rx="18" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="423" y="533" font-family="Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#22d3ee">💰 Earn</text>

  <rect x="502" y="510" width="150" height="36" rx="18" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="577" y="533" font-family="Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#f59e0b">🪂 Airdrop XP</text>

  <!-- URL -->
  <text x="1120" y="590" font-family="Arial,sans-serif" font-size="18" font-weight="600" text-anchor="end" fill="rgba(255,255,255,0.28)">arc-nova.vercel.app</text>

  <!-- Decorative ring -->
  <circle cx="980" cy="315" r="200" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="1.5"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <circle cx="980" cy="315" r="240" fill="none" stroke="rgba(139,92,246,0.06)" stroke-width="1"/>

  <!-- Center dot -->
  <circle cx="980" cy="315" r="48" fill="rgba(124,58,237,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
  <text x="980" y="333" font-family="Arial,sans-serif" font-size="36" font-weight="900" text-anchor="middle" fill="white">◈</text>
</svg>
